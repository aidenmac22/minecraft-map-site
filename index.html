<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Map</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div id="map-wrap">
      <div id="toolbar">
        <input id="search" type="search" placeholder="Search territory..." />
        <button id="resetView">Reset</button>
      </div>

      <div id="stage">
        <div id="world">
          <img id="mapImage" src="./output-smallpngtools.png" alt="Minecraft server map" />
          <svg id="overlay"></svg>
        </div>
      </div>
    </div>

    <aside id="panel">
      <h1 id="title">Click a territory</h1>
      <div id="meta"></div>
      <p id="description">Territory information will appear here.</p>
      <div id="results"></div>
    </aside>
  </div>

  <script src="./app.js"></script>
</body>
</html>
